<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Conversación</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 14px 24px;
      background: #1a1a22;
      border-bottom: 1px solid #2a2a36;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #c0c0d0;
      flex: 1;
    }
    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #444;
      transition: background 0.4s, box-shadow 0.4s;
      flex-shrink: 0;
    }
    #status-dot.connected    { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    #status-dot.disconnected { background: #f87171; }
    #status-dot.connecting   { background: #facc15; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #session-timer {
      font-size: 0.78rem;
      color: #555;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
      text-align: right;
    }

    /* ── Start/Stop button ── */
    #btn-toggle {
      padding: 7px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }
    #btn-toggle:active { transform: scale(0.97); }
    #btn-toggle.idle  { background: #4ade80; color: #0a1a0a; }
    #btn-toggle.idle:hover  { background: #86efac; }
    #btn-toggle.active { background: #f87171; color: #1a0a0a; }
    #btn-toggle.active:hover { background: #fca5a5; }
    #btn-toggle:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Transcription panel (60%) ── */
    #transcription-panel {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a36;
      overflow: hidden;
    }
    #transcription-panel h2 {
      flex-shrink: 0;
      padding: 12px 20px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      border-bottom: 1px solid #2a2a36;
    }
    #transcription-text {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 1rem;
      color: #c8c8d8;
      word-break: break-word;
    }
    #transcription-text p {
      line-height: 1.65;
      padding: 8px 12px;
      border-left: 2px solid #2a2a36;
      margin-bottom: 10px;
      animation: fadein 0.3s ease;
    }
    #transcription-text p:last-child { margin-bottom: 0; }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    #transcription-text.placeholder { color: #3a3a4a; font-style: italic; padding: 20px; }

    /* Indicador de escucha activa */
    #listening-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      color: #555;
      font-size: 0.85rem;
    }
    #listening-indicator.visible { display: flex; }
    #listening-indicator span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 1s ease-in-out infinite;
    }
    #listening-indicator span:nth-child(2) { animation-delay: 0.2s; }
    #listening-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
    #transcription-text::-webkit-scrollbar { width: 5px; }
    #transcription-text::-webkit-scrollbar-track { background: transparent; }
    #transcription-text::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 3px; }

    /* ── Semaphore panel (40%) ── */
    #semaphore-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 32px 24px;
      position: relative;
    }
    #semaphore-panel h2 {
      position: absolute;
      top: 12px;
      left: 20px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
    }

    #semaphore-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      transition: background 1.5s ease, box-shadow 1.5s ease;
      margin-bottom: 28px;
    }
    #semaphore-circle.verde {
      background: #22c55e;
      box-shadow: 0 0 80px 20px rgba(34,197,94,0.35);
    }
    #semaphore-circle.amarillo {
      background: #f59e0b;
      box-shadow: 0 0 80px 20px rgba(245,158,11,0.35);
    }
    #semaphore-circle.rojo {
      background: #ef4444;
      box-shadow: 0 0 80px 20px rgba(239,68,68,0.35);
    }
    #semaphore-circle.inactivo {
      background: #2a2a36;
      box-shadow: none;
    }

    #estado-label {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: color 1.5s ease;
    }
    #estado-label.verde    { color: #22c55e; }
    #estado-label.amarillo { color: #f59e0b; }
    #estado-label.rojo     { color: #ef4444; }
    #estado-label.inactivo { color: #3a3a4a; }

    #razon-text {
      font-size: 0.92rem;
      color: #ef4444;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      min-height: 42px;
      transition: opacity 0.5s ease;
    }

    #consejo-text {
      font-size: 0.88rem;
      color: #94a3b8;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      margin-top: 8px;
      transition: opacity 0.5s ease;
    }

    #meta-row {
      position: absolute;
      bottom: 16px;
      display: flex;
      gap: 24px;
      font-size: 0.72rem;
      color: #444;
    }
    #meta-row span { display: flex; gap: 6px; align-items: center; }
    .meta-value { color: #666; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      padding: 7px 24px;
      background: #1a1a22;
      border-top: 1px solid #2a2a36;
      font-size: 0.7rem;
      color: #3a3a4a;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #error-msg {
      color: #f87171;
      flex: 1;
      text-align: right;
    }
  </style>
</head>

<main>
  <section id="transcription-panel">
    <h2>Transcripción en tiempo real</h2>
    <div id="transcription-text" class="placeholder">Inicia una sesión para comenzar la transcripción.</div>
    <div id="listening-indicator"><span></span><span></span><span></span> Escuchando...</div>
  </section>

  <section id="semaphore-panel">
    <h2>Estado</h2>
    <div id="semaphore-circle" class="inactivo"></div>
    <div id="estado-label" class="inactivo">—</div>
    <div id="razon-text"></div>
    <div id="consejo-text"></div>
    <div id="meta-row">
      <span>Puntuación <span class="meta-value" id="score-value">—</span></span>
      <span>Tendencia <span class="meta-value" id="tendencia-value">—</span></span>
    </div>
  </section>
</main>

<footer>
  <span>Backend: <span id="footer-backend">ws://localhost:8080</span></span>
  <span id="error-msg"></span>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// AudioWorklet: captura PCM16 mono 16kHz, chunks de 480ms (7680 samples)
// Se inyecta como Blob para funcionar sin servidor de ficheros adicional.
// ─────────────────────────────────────────────────────────────────────────────
const WORKLET_CODE = `
class VoxtralProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._buf = new Int16Array(7680);  // 480ms @ 16kHz
    this._pos = 0;
  }
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) {
      // Float32 → Int16 con clamp [-1, 1]
      const s = ch[i] < -1 ? -1 : ch[i] > 1 ? 1 : ch[i];
      this._buf[this._pos++] = s < 0 ? s * 32768 : s * 32767;
      if (this._pos >= this._buf.length) {
        this.port.postMessage(this._buf.buffer, [this._buf.buffer]);
        this._buf = new Int16Array(7680);
        this._pos = 0;
      }
    }
    return true;
  }
}
registerProcessor('voxtral-processor', VoxtralProcessor);
`;

// ─────────────────────────────────────────────────────────────────────────────
// Configuración
// ─────────────────────────────────────────────────────────────────────────────
const WS_SCHEME = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const BACKEND   = `${WS_SCHEME}//${window.location.host}`;
document.getElementById('footer-backend').textContent = BACKEND;

// ─────────────────────────────────────────────────────────────────────────────
// Estado global
// ─────────────────────────────────────────────────────────────────────────────
let wsEvents      = null;
let wsAudio       = null;
let audioCtx      = null;
let workletNode   = null;
let mediaStream   = null;
let sessionActive = false;
let sessionStart  = null;
let timerInterval = null;
let reconnectTimer  = null;
let reconnectDelay  = 1000;

// ─────────────────────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────────────────────
const btnToggle      = document.getElementById('btn-toggle');
const statusDot      = document.getElementById('status-dot');
const sessionTimerEl = document.getElementById('session-timer');
const transcriptEl      = document.getElementById('transcription-text');
const listeningEl       = document.getElementById('listening-indicator');
const circleEl       = document.getElementById('semaphore-circle');
const estadoEl       = document.getElementById('estado-label');
const razonEl        = document.getElementById('razon-text');
const consejoEl      = document.getElementById('consejo-text');
const scoreEl        = document.getElementById('score-value');
const tendenciaEl    = document.getElementById('tendencia-value');
const errorMsgEl     = document.getElementById('error-msg');

// ─────────────────────────────────────────────────────────────────────────────
// WebSocket /ws/events — siempre conectado, reconecta automáticamente
// ─────────────────────────────────────────────────────────────────────────────
function connectEvents() {
  clearTimeout(reconnectTimer);
  setStatusDot('connecting');

  wsEvents = new WebSocket(`${BACKEND}/ws/events`);

  wsEvents.onopen = () => {
    setStatusDot('connected');
    reconnectDelay = 1000;
    setError('');
  };

  wsEvents.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    handleEvent(msg);
  };

  wsEvents.onclose = () => {
    setStatusDot('disconnected');
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
      connectEvents();
    }, reconnectDelay);
  };

  wsEvents.onerror = () => setError('Sin conexión con el backend');
}

// ─────────────────────────────────────────────────────────────────────────────
// Manejo de eventos recibidos del backend
// ─────────────────────────────────────────────────────────────────────────────
function handleEvent(msg) {
  switch (msg.type) {

    case 'transcript.delta':
      if (msg.text) appendDelta(msg.text);
      break;

    case 'semaphore.update':
      updateSemaphore(
        msg.estado     ?? 'verde',
        msg.puntuacion ?? null,
        msg.tendencia  ?? null,
        msg.razon      ?? '',
        msg.consejo    ?? ''
      );
      break;

    case 'system.status':
      if (msg.connected !== undefined) {
        setStatusDot(msg.connected ? 'connected' : 'disconnected');
      }
      break;

    case 'system.error':
      setError(msg.message || 'Error desconocido');
      break;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Panel de transcripción
// transcript.delta con texto → acumula en el <p> en curso.
// Si el delta contiene puntuación final (. ? !) cierra el párrafo:
// el siguiente delta abrirá uno nuevo.
// ─────────────────────────────────────────────────────────────────────────────
const SENTENCE_END = /[.?!]/;
let currentP = null;

function appendDelta(text) {
  if (transcriptEl.classList.contains('placeholder')) {
    transcriptEl.classList.remove('placeholder');
    transcriptEl.textContent = '';
  }

  if (!currentP) {
    currentP = document.createElement('p');
    transcriptEl.appendChild(currentP);
    showListening();
  }

  const prev = currentP.textContent;
  currentP.textContent = prev + text;
  transcriptEl.scrollTop = transcriptEl.scrollHeight;

  // Cierra el párrafo si el delta contiene puntuación final
  if (SENTENCE_END.test(text)) {
    currentP = null;
    hideListening();
  }
}

function showListening() {
  listeningEl.classList.add('visible');
}

function hideListening() {
  listeningEl.classList.remove('visible');
}

function resetTranscript() {
  currentP = null;
  transcriptEl.innerHTML = '';
  transcriptEl.classList.add('placeholder');
  transcriptEl.textContent = 'Inicia una sesión para comenzar la transcripción.';
  hideListening();
}

// ─────────────────────────────────────────────────────────────────────────────
// Semáforo
// ─────────────────────────────────────────────────────────────────────────────
function updateSemaphore(estado, puntuacion, tendencia, razon, consejo) {
  const valid = ['verde', 'amarillo', 'rojo'];
  if (!valid.includes(estado)) return;

  circleEl.className = estado;
  estadoEl.className = estado;
  estadoEl.textContent = estado.charAt(0).toUpperCase() + estado.slice(1);

  if (puntuacion !== null && puntuacion !== undefined) {
    scoreEl.textContent = puntuacion;
  }
  if (tendencia) {
    tendenciaEl.textContent = tendencia;
  }

  razonEl.style.opacity = '0';
  consejoEl.style.opacity = '0';
  setTimeout(() => {
    const showExtras = estado !== 'verde';
    razonEl.textContent   = (showExtras && razon)   ? razon   : '';
    consejoEl.textContent = (showExtras && consejo) ? `💡 ${consejo}` : '';
    razonEl.style.opacity   = '1';
    consejoEl.style.opacity = '1';
  }, 300);
}

function resetSemaphore() {
  circleEl.className  = 'inactivo';
  estadoEl.className  = 'inactivo';
  estadoEl.textContent = '—';
  razonEl.textContent  = '';
  consejoEl.textContent = '';
  scoreEl.textContent  = '—';
  tendenciaEl.textContent = '—';
}

// ─────────────────────────────────────────────────────────────────────────────
// Sesión de audio
// ─────────────────────────────────────────────────────────────────────────────
async function startSession() {
  setBtnState('disabled');
  setError('');

  // 1. Solicitar micrófono
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });
  } catch (err) {
    setError(`Micrófono no disponible: ${err.message}`);
    setBtnState('idle');
    return;
  }

  // 2. Abrir WebSocket /ws/audio
  wsAudio = new WebSocket(`${BACKEND}/ws/audio`);

  wsAudio.onerror = () => {
    setError('No se pudo conectar con el backend');
    teardownAudio();
    setBtnState('idle');
  };

  wsAudio.onclose = () => {
    if (sessionActive) stopSession();
  };

  wsAudio.onopen = async () => {
    // 3. Configurar AudioWorklet
    try {
      await setupWorklet(mediaStream);
    } catch (err) {
      setError(`Error al iniciar captura de audio: ${err.message}`);
      teardownAudio();
      setBtnState('idle');
      return;
    }

    // Sesión activa
    sessionActive = true;
    sessionStart  = Date.now();
    setBtnState('active');
    resetTranscript();
    transcriptEl.classList.remove('placeholder');
    transcriptEl.textContent = '';
    startTimer();
  };
}

async function setupWorklet(stream) {
  // Inyectar worklet como Blob URL (no requiere fichero externo)
  const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
  const blobUrl = URL.createObjectURL(blob);

  audioCtx = new AudioContext({ sampleRate: 16000 });
  await audioCtx.audioWorklet.addModule(blobUrl);
  URL.revokeObjectURL(blobUrl);

  const source = audioCtx.createMediaStreamSource(stream);
  workletNode   = new AudioWorkletNode(audioCtx, 'voxtral-processor');

  workletNode.port.onmessage = ({ data: buffer }) => {
    if (wsAudio?.readyState !== WebSocket.OPEN) return;
    wsAudio.send(JSON.stringify({
      type:  'input_audio_buffer.append',
      audio: arrayBufferToBase64(buffer),
    }));
  };

  source.connect(workletNode);
  // No conectamos workletNode → destination: no queremos reproducir el micro
}

function stopSession() {
  if (!sessionActive) return;
  sessionActive = false;

  // Señal de cierre ordenado al backend
  if (wsAudio?.readyState === WebSocket.OPEN) {
    try { wsAudio.send(JSON.stringify({ type: 'session.close' })); } catch {}
    wsAudio.close();
  }

  teardownAudio();
  stopTimer();
  resetSemaphore();
  setBtnState('idle');
}

function teardownAudio() {
  workletNode?.disconnect();
  workletNode = null;

  audioCtx?.close().catch(() => {});
  audioCtx = null;

  mediaStream?.getTracks().forEach(t => t.stop());
  mediaStream = null;

  wsAudio = null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Temporizador de sesión
// ─────────────────────────────────────────────────────────────────────────────
function startTimer() {
  sessionTimerEl.textContent = '00:00';
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - sessionStart) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    sessionTimerEl.textContent = `${mm}:${ss}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  sessionTimerEl.textContent = '00:00';
}

// ─────────────────────────────────────────────────────────────────────────────
// Helpers UI
// ─────────────────────────────────────────────────────────────────────────────
function setStatusDot(state) {
  statusDot.className = state; // 'connected' | 'disconnected' | 'connecting'
}

function setBtnState(state) {
  btnToggle.disabled = (state === 'disabled');
  if (state === 'idle') {
    btnToggle.textContent = 'Iniciar sesión';
    btnToggle.className   = 'idle';
  } else if (state === 'active') {
    btnToggle.textContent = 'Detener sesión';
    btnToggle.className   = 'active';
  }
}

function setError(msg) {
  errorMsgEl.textContent = msg;
}

// ─────────────────────────────────────────────────────────────────────────────
// Utilidades
// ─────────────────────────────────────────────────────────────────────────────
function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  // Procesamos en bloques para no desbordar la pila de String.fromCharCode
  const CHUNK = 8192;
  for (let i = 0; i < bytes.length; i += CHUNK) {
    binary += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
  }
  return btoa(binary);
}

// ─────────────────────────────────────────────────────────────────────────────
// Eventos de UI
// ─────────────────────────────────────────────────────────────────────────────
btnToggle.addEventListener('click', () => {
  sessionActive ? stopSession() : startSession();
});

// Cierre ordenado al cerrar la pestaña
window.addEventListener('beforeunload', () => {
  if (wsAudio?.readyState === WebSocket.OPEN) {
    try { wsAudio.send(JSON.stringify({ type: 'session.close' })); } catch {}
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// Inicio
// ─────────────────────────────────────────────────────────────────────────────
connectEvents();
</script>
</body>
</html>
